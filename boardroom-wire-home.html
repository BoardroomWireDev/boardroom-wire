<!--
  ═══════════════════════════════════════════════════════════════════════
  BOARDROOM WIRE — Homepage (TBPN-inspired, simplified)
  ═══════════════════════════════════════════════════════════════════════

  STRUCTURE (top to bottom):
    1. Live Wire ticker   — pulls YouTube channel stats
    2. Logo top-left      — BOARDROOM (white) + WIRE (gold)
    3. Centered globe     — Three.js wireframe with pulsing nodes
    4. Tagline + schedule
    5. "Find Boardroom Wire" + social icons row
    6. "More Info" button → about page

  ▼ YOUTUBE SETUP — fill in two values to make the ticker live.
    See the <script> block at the bottom for instructions.
  ═══════════════════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boardroom Wire</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  /* ================================================================
     DESIGN TOKENS — change these to retune the entire site
     ================================================================ */
  :root {
    --black:       #000000;
    --black-soft:  #0A0A0A;
    --line:        #1A1A1A;

    --white:       #F5F1E5;
    --white-dim:   #888173;

    --gold:        #D4AF37;
    --gold-bright: #F2CB52;

    --serif: 'Fraunces', Georgia, serif;
    --mono:  'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--black);
    color: var(--white);
    font-family: var(--serif);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Subtle film-grain overlay (keeps black from feeling flat) */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
  }

  /* ================================================================
     1. LIVE WIRE TICKER (top bar — YouTube stats)
     ================================================================ */
  .ticker {
    display: flex;
    align-items: stretch;
    height: 38px;
    border-bottom: 1px solid var(--line);
    background: var(--black);
    position: relative;
    z-index: 10;
  }
  .ticker-label {
    background: var(--gold);
    color: var(--black);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    padding: 0 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
  }
  .ticker-label .pulse {
    width: 6px; height: 6px;
    background: var(--black);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  .ticker-stats {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 24px;
    gap: 16px;
    overflow: hidden;
  }
  .stat {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--white-dim);
    text-transform: uppercase;
    display: flex;
    align-items: baseline;
    gap: 10px;
    white-space: nowrap;
  }
  .stat .v {
    color: var(--white);
    font-weight: 500;
  }
  .stat.live .v.on  { color: var(--gold-bright); }
  .stat.live .v.off { color: var(--white-dim); }

  /* ================================================================
     2. LOGO (top-left)
     ================================================================ */
  header.top {
    padding: 32px 48px 0;
    position: relative;
    z-index: 5;
  }
  .logo {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--white);
    font-variation-settings: "opsz" 144;
    user-select: none;
  }
  .logo .wire { color: var(--gold-bright); }

  /* ================================================================
     3. HERO (globe centered, everything stacks below)
     ================================================================ */
  main.hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px 24px 80px;
    min-height: calc(100vh - 38px - 50px);
    position: relative;
    z-index: 5;
  }

  .globe-wrap {
    position: relative;
    width: min(540px, 80vw);
    aspect-ratio: 1 / 1;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeIn 1.4s ease-out 0.2s forwards;
  }
  #globe { width: 100%; height: 100%; }

  /* Decorative dashed ring rotating slowly around the globe */
  .globe-wrap::before {
    content: "";
    position: absolute;
    inset: -6%;
    border: 1px dashed rgba(212, 175, 55, 0.22);
    border-radius: 50%;
    animation: spin-slow 90s linear infinite;
    pointer-events: none;
  }
  @keyframes spin-slow { to { transform: rotate(360deg); } }

  /* Tagline + schedule */
  .tagline {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(28px, 4vw, 44px);
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
    font-variation-settings: "opsz" 144;
    opacity: 0;
    animation: fadeUp 0.9s ease-out 0.4s forwards;
  }
  .tagline em {
    font-style: italic;
    color: var(--gold-bright);
  }
  .schedule {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.28em;
    color: var(--white-dim);
    text-transform: uppercase;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.9s ease-out 0.55s forwards;
  }

  /* Find Boardroom Wire + socials */
  .find-us {
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.9s ease-out 0.7s forwards;
  }
  .find-us-label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.28em;
    color: var(--white-dim);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .socials {
    display: flex;
    gap: 28px;
    justify-content: center;
    align-items: center;
  }
  .socials a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    color: var(--white);
    transition: all 0.2s;
    text-decoration: none;
  }
  .socials a:hover {
    color: var(--gold-bright);
    transform: translateY(-2px);
  }
  .socials svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
  }

  /* More Info button */
  .more-info {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.28em;
    color: var(--white);
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--line);
    padding: 14px 28px;
    transition: all 0.2s;
    opacity: 0;
    animation: fadeUp 0.9s ease-out 0.85s forwards;
  }
  .more-info:hover {
    border-color: var(--gold);
    color: var(--gold-bright);
  }

  /* ================================================================
     ANIMATIONS
     ================================================================ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ================================================================
     RESPONSIVE
     ================================================================ */
  @media (max-width: 720px) {
    header.top { padding: 24px 24px 0; }
    .ticker-stats { gap: 14px; padding: 0 14px; }
    .stat { font-size: 10px; letter-spacing: 0.1em; gap: 6px; }
    .ticker-label { font-size: 10px; padding: 0 12px; }
    .socials { gap: 20px; }
  }
  @media (max-width: 520px) {
    /* On tiny screens, hide one stat so the ticker stays clean */
    .stat:nth-child(3) { display: none; }
  }
</style>

  <!-- ================================================================
       SCRIPTS — YouTube data + Three.js globe

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    /* ════════════════════════════════════════════════════════════════
       YOUTUBE LIVE STATS — fill these in to make the ticker live
       ════════════════════════════════════════════════════════════════

       1. Get a YouTube Data API v3 key:
            https://console.cloud.google.com/
            → Create project → Enable "YouTube Data API v3"
            → Credentials → Create API key
            → IMPORTANT: restrict the key to your domain (HTTP referrers)
              so nobody else can use it

       2. Get your channel ID:
            On YouTube → Settings → Advanced → "Channel ID"
            (or visit your channel and grab the UC... id from the URL)

       3. Paste both below. Until you do, the ticker shows placeholders.
       ════════════════════════════════════════════════════════════════ */

    const YOUTUBE_API_KEY = '';   // ← paste your API key here
    const CHANNEL_ID      = '';   // ← paste your channel ID here (starts with UC...)

    // Placeholder values shown when no API key is set
    const PLACEHOLDER = {
      videos: 47,
      subs:   '12.4K',
      views:  '1.2M',
      live:   null         // null = "Off Air", or a number = live viewer count
    };

    // Format big numbers compactly: 12400 → "12.4K", 1200000 → "1.2M"
    function fmt(n) {
      n = Number(n);
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (n >= 1_000)     return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
      return n.toLocaleString();
    }

    function renderStats({ videos, subs, views, live }) {
      document.getElementById('stat-videos').textContent = videos;
      document.getElementById('stat-subs').textContent   = subs;
      document.getElementById('stat-views').textContent  = views;
      const liveEl = document.getElementById('stat-live');
      if (live === null || live === undefined) {
        liveEl.textContent = 'Off Air';
        liveEl.className = 'v off';
      } else {
        liveEl.textContent = fmt(live) + ' watching';
        liveEl.className = 'v on';
      }
    }

    async function fetchYouTubeStats() {
      // No key set → use placeholders
      if (!YOUTUBE_API_KEY || !CHANNEL_ID) {
        renderStats({
          videos: PLACEHOLDER.videos,
          subs:   PLACEHOLDER.subs,
          views:  PLACEHOLDER.views,
          live:   PLACEHOLDER.live
        });
        return;
      }

      try {
        // Channel-level stats
        const chRes = await fetch(
          `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${YOUTUBE_API_KEY}`
        );
        const chData = await chRes.json();
        const s = chData.items?.[0]?.statistics;
        if (!s) throw new Error('No channel data');

        // Check if there's a current live broadcast
        let liveCount = null;
        const searchRes = await fetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${YOUTUBE_API_KEY}`
        );
        const searchData = await searchRes.json();
        const liveVideoId = searchData.items?.[0]?.id?.videoId;
        if (liveVideoId) {
          const vidRes = await fetch(
            `https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${liveVideoId}&key=${YOUTUBE_API_KEY}`
          );
          const vidData = await vidRes.json();
          liveCount = Number(vidData.items?.[0]?.liveStreamingDetails?.concurrentViewers ?? 0);
        }

        renderStats({
          videos: fmt(s.videoCount),
          subs:   fmt(s.subscriberCount),
          views:  fmt(s.viewCount),
          live:   liveCount
        });
      } catch (err) {
        console.warn('YouTube stats fetch failed, showing placeholders:', err);
        renderStats({
          videos: PLACEHOLDER.videos,
          subs:   PLACEHOLDER.subs,
          views:  PLACEHOLDER.views,
          live:   PLACEHOLDER.live
        });
      }
    }

    // Fetch on page load, then refresh every 60s for live viewer count
    fetchYouTubeStats();
    setInterval(fetchYouTubeStats, 60_000);
  </script>

  <script>
    /* ════════════════════════════════════════════════════════════════
       THREE.JS WIREFRAME GLOBE
       Wireframe sphere + pulsing data nodes + arc connections.
       ════════════════════════════════════════════════════════════════ */

    const canvas = document.getElementById('globe');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
    camera.position.z = 3.2;

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true
    });
    renderer.setPixelRatio(window.devicePixelRatio);

    function resize() {
      const size = canvas.clientWidth;
      renderer.setSize(size, size, false);
      camera.aspect = 1;
      camera.updateProjectionMatrix();
    }
    resize();
    window.addEventListener('resize', resize);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // Solid black sphere (so back of wireframe doesn't show through)
    const baseSphere = new THREE.Mesh(
      new THREE.SphereGeometry(1, 64, 64),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    globeGroup.add(baseSphere);

    // Primary wireframe (gold)
    const wireSphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.001, 32, 24),
      new THREE.MeshBasicMaterial({
        color: 0xD4AF37,
        wireframe: true,
        transparent: true,
        opacity: 0.5
      })
    );
    globeGroup.add(wireSphere);

    // Secondary wireframe (icosahedron — adds visual texture)
    const wireSphere2 = new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.005, 3),
      new THREE.MeshBasicMaterial({
        color: 0xF2CB52,
        wireframe: true,
        transparent: true,
        opacity: 0.18
      })
    );
    globeGroup.add(wireSphere2);

    // Data nodes — golden-angle spiral distribution for even spread
    const nodeCount = 28;
    const nodes = [];
    const phi = Math.PI * (3 - Math.sqrt(5));
    const nodePoints = [];
    for (let i = 0; i < nodeCount; i++) {
      const y = 1 - (i / (nodeCount - 1)) * 2;
      const r = Math.sqrt(1 - y * y);
      const theta = phi * i;
      nodePoints.push(new THREE.Vector3(
        Math.cos(theta) * r * 1.02,
        y * 1.02,
        Math.sin(theta) * r * 1.02
      ));
    }
    nodePoints.forEach(p => {
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.02, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0xF2CB52 })
      );
      dot.position.copy(p);
      dot.userData.phase = Math.random() * Math.PI * 2;
      globeGroup.add(dot);
      nodes.push(dot);
    });

    // Arc connections between random node pairs
    for (let i = 0; i < 6; i++) {
      const a = nodePoints[Math.floor(Math.random() * nodePoints.length)];
      const b = nodePoints[Math.floor(Math.random() * nodePoints.length)];
      if (a === b) continue;
      const mid = a.clone().add(b).multiplyScalar(0.5).normalize().multiplyScalar(1.4);
      const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
      const line = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(curve.getPoints(40)),
        new THREE.LineBasicMaterial({ color: 0xD4AF37, transparent: true, opacity: 0.5 })
      );
      globeGroup.add(line);
    }

    // Animate — slow rotation + pulsing nodes
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.005;
      globeGroup.rotation.y += 0.0018;
      globeGroup.rotation.x = Math.sin(t * 0.3) * 0.08;
      nodes.forEach(n => {
        const pulse = 0.7 + Math.sin(t * 2 + n.userData.phase) * 0.4;
        n.scale.setScalar(pulse);
      });
      renderer.render(scene, camera);
    }
    animate();
  </script>

</body>
